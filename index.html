<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="calculator">
            <div class="theme-toggle">
                <button id="themeBtn">🌓</button>
            </div>
            
            <div class="display">
                <div id="history" class="history-text"></div>
                <div id="result" class="result-text">0</div>
            </div>

            <div class="buttons">
                <!-- Row 1: Scientific -->
                <button class="btn-sci" onclick="appendOperator('(')">(</button>
                <button class="btn-sci" onclick="appendOperator(')')">)</button>
                <button class="btn-sci" onclick="calculateScientific('sin')">sin</button>
                <button class="btn-sci" onclick="calculateScientific('cos')">cos</button>
                <button class="btn-sci" onclick="calculateScientific('tan')">tan</button>
                
                <!-- Row 2: Scientific -->
                <button class="btn-sci" onclick="insertConstant('PI')">π</button>
                <button class="btn-sci" onclick="insertConstant('E')">e</button>
                <button class="btn-sci" onclick="calculateScientific('log')">log</button>
                <button class="btn-sci" onclick="calculateScientific('ln')">ln</button>
                <button class="btn-sci" onclick="appendOperator('**')">xʸ</button>

                <!-- Row 3: Basic -->
                <button class="btn-action" onclick="clearDisplay()">AC</button>
                <button class="btn-action" onclick="deleteLast()">DEL</button>
                <button class="btn-sci" onclick="calculateScientific('sqrt')">√</button>
                <button class="btn-sci" onclick="appendOperator('**2')">x²</button>
                <button class="btn-op" onclick="appendOperator('/')">/</button>

                <!-- Row 4: Digits -->
                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn-op" onclick="appendOperator('*')">×</button>
                <button class="btn-action" onclick="copyResult()">📋</button>

                <!-- Row 5: Digits -->
                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn-op" onclick="appendOperator('-')">-</button>
                <button class="btn-sci" onclick="appendOperator('%')">%</button>

                <!-- Row 6: Digits -->
                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn-op" onclick="appendOperator('+')">+</button>
                <button class="btn-eq" onclick="calculateResult()">=</button>

                <!-- Row 7: Bottom -->
                <button class="btn" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
                <button class="btn" onclick="appendNumber('.')">.</button>
                <button class="btn-sci" onclick="toggleSign()">+/-</button>
            </div>
        </div>

        <div class="history-panel">
            <h3>History</h3>
            <div id="historyList"></div>
            <button class="clear-history" onclick="clearHistory()">Clear History</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
